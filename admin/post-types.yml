interview:
  name: Phỏng vấn
  description: Bài dịch phỏng vấn với hero, đoạn dẫn, hỏi–đáp, ảnh minh họa và hồ sơ khách mời.
  supports_txt_import: false
  categories: [Phỏng vấn]
  tags: []
  default_body: |-
    <div class="interview-kicker">ĐẶC BIỆT · PHỎNG VẤN</div>

    {% scene "/images/translations/ten-bai/cover.jpg" "" %}

    <div class="translation-meta">
      <strong>Khách mời:</strong> Tên khách mời<br>
      <strong>Phỏng vấn / biên soạn:</strong> Tên người thực hiện<br>
      <strong>Nguồn:</strong> <a href="URL_BAI_GOC">Tên nguồn</a><br>
      <strong>Người dịch:</strong> Tên của bạn
    </div>

    {% interview_lead %}
    Viết đoạn dẫn giới thiệu khách mời và chủ đề phỏng vấn.
    {% endinterview_lead %}

    <!-- more -->

    ## Tiêu đề chương

    {% interview_question %}
    Câu hỏi của người phỏng vấn?
    {% endinterview_question %}

    {% interview_answer "Tên khách mời" %}
    Câu trả lời của khách mời.
    {% endinterview_answer %}

    {% scene "/images/translations/ten-bai/figure-01.jpg" "Chú thích ảnh." %}

    ## Hồ sơ khách mời

    **Tên khách mời**

    Tiểu sử ngắn.

