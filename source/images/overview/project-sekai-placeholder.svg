<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" role="img" aria-labelledby="title description">
  <title id="title">Ảnh minh họa Project Sekai</title>
  <desc id="description">Ảnh giữ chỗ để thay bằng bìa của truyện hoặc sự kiện.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6658d3"/>
      <stop offset="1" stop-color="#b59cff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="480" rx="24" fill="url(#background)"/>
  <circle cx="790" cy="80" r="190" fill="#fff" opacity=".1"/>
  <circle cx="130" cy="430" r="230" fill="#fff" opacity=".08"/>
  <text x="480" y="220" fill="#fff" font-family="Segoe UI, sans-serif" font-size="56" font-weight="700" text-anchor="middle">PROJECT SEKAI</text>
  <text x="480" y="285" fill="#fff" font-family="Segoe UI, sans-serif" font-size="28" text-anchor="middle" opacity=".9">Thay ảnh minh họa tại đây</text>
</svg>
